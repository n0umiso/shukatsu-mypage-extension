<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>就活マイページ ダッシュボード</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <h1>就活マイページ</h1>
      <p>ダッシュボード</p>
    </div>
    <nav>
      <button class="nav active" data-view="home">🏠 ホーム</button>
      <button class="nav" data-view="list">📋 マイページ</button>
      <button class="nav" data-view="senko">✅ 選考管理</button>
      <button class="nav" data-view="deadlines">📅 締切</button>
      <button class="nav" id="nav-options">⚙ 情報・設定</button>
    </nav>
    <div class="sync-box">
      <button id="sync">⟳ スプレッドシート同期</button>
      <p id="sync-info"></p>
    </div>
  </aside>

  <main class="main">
    <!-- ホーム -->
    <section id="view-home">
      <div class="page-head">
        <h2 id="greeting">ホーム</h2>
        <span id="today" class="muted"></span>
      </div>

      <div class="metrics">
        <div class="metric"><span class="m-label">登録企業</span><span id="m-total" class="m-num">0</span></div>
        <div class="metric"><span class="m-label">選考中</span><span id="m-active" class="m-num">0</span></div>
        <div class="metric"><span class="m-label">今週の締切</span><span id="m-week" class="m-num warn">0</span></div>
      </div>

      <h3 class="sec"><span>⏰ 締切が近い</span></h3>
      <div id="home-deadlines" class="home-list"></div>

      <h3 class="sec"><span>⚡ クイックログイン</span></h3>
      <div id="home-quick" class="home-list"></div>
    </section>

    <!-- マイページ一覧 -->
    <section id="view-list" class="hidden">
      <div class="page-head">
        <h2>📄 マイページ一覧</h2>
        <button id="add" class="primary">＋ マイページを追加</button>
      </div>
      <p class="lead">ログインを検知すると自動で追加されます。企業名／URLから各マイページへ移動できます。</p>
      <div class="toolbar">
        <input id="search" type="search" placeholder="マイページを検索（企業名・ID・URL）" />
        <select id="filter-industry"><option value="">すべての業界</option></select>
        <select id="sort">
          <option value="updated">更新順</option>
          <option value="industry">業界順</option>
          <option value="name">企業名順</option>
        </select>
      </div>
      <div id="grid" class="grid"></div>
    </section>

    <!-- 選考管理 -->
    <section id="view-senko" class="hidden">
      <div class="page-head">
        <h2>✅ 選考管理</h2>
        <div class="seg">
          <button id="senko-progress" class="seg-btn active">進捗</button>
          <button id="senko-board" class="seg-btn">列</button>
        </div>
      </div>
      <p class="stage-flow" id="stage-flow"></p>
      <div id="senko-list" class="senko-list"></div>
      <div id="senko-kanban" class="kanban hidden"></div>
    </section>

    <!-- 締切 -->
    <section id="view-deadlines" class="hidden">
      <div class="page-head"><h2>📅 締切カレンダー</h2></div>
      <p class="lead">登録された締切を日付順に表示します。</p>
      <ul id="deadline-list" class="deadline-list"></ul>
    </section>
  </main>

  <!-- 追加／編集モーダル -->
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <h3 id="modal-title">マイページを追加</h3>
      <label>企業名 <input id="f-company" type="text" placeholder="例: A商事" /></label>
      <label>業界 <select id="f-industry"></select></label>
      <label>マイページURL <input id="f-url" type="url" placeholder="https://..." /></label>
      <label>ログインID <input id="f-id" type="text" /></label>
      <label>パスワード
        <span class="pw-row"><input id="f-pw" type="password" /><button id="pw-toggle" type="button" class="mini">表示</button></span>
      </label>
      <label>締切（1行1件 / 例: ES:2026/06/30）<textarea id="f-deadlines" rows="3"></textarea></label>
      <label>選考ステージ <select id="f-stage"></select></label>
      <label>メモ <textarea id="f-memo" rows="2"></textarea></label>
      <div class="modal-actions">
        <button id="save" class="primary">保存</button>
        <button id="cancel" class="ghost">キャンセル</button>
      </div>
    </div>
  </div>

  <script type="module" src="dashboard.js"></script>
</body>
</html>
