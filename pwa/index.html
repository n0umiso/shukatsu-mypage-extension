<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#223049" />
  <title>就活マイページ</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 設定画面 -->
  <div id="setup" class="setup hidden">
    <div class="setup-card">
      <h1>就活マイページ</h1>
      <p>スプレッドシートのデータを表示します。<br>拡張機能の設定画面と同じ GAS URL・トークンを入力してください。</p>
      <label>GAS Web アプリ URL<input id="s-url" type="url" placeholder="https://script.google.com/macros/s/.../exec" /></label>
      <label>同期トークン<input id="s-token" type="password" placeholder="空なら認証なし" /></label>
      <button id="s-save" class="btn-primary">接続</button>
      <div id="s-error" class="error"></div>
    </div>
  </div>

  <!-- メイン画面 -->
  <div id="app" class="hidden">
    <header>
      <h1>就活マイページ</h1>
      <div class="header-actions">
        <span id="sync-status" class="sync-status"></span>
        <button id="refresh" class="icon-btn" title="更新">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 4v5h-5"/></svg>
        </button>
        <button id="config" class="icon-btn" title="設定">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"/></svg>
        </button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-view="home">ホーム</button>
      <button class="tab" data-view="list">一覧</button>
      <button class="tab" data-view="deadlines">締切</button>
    </nav>

    <!-- ホーム -->
    <section id="view-home" class="view">
      <div class="metrics">
        <div class="metric"><span id="m-total" class="m-num">0</span><span class="m-label">登録数</span></div>
        <div class="metric"><span id="m-active" class="m-num">0</span><span class="m-label">選考中</span></div>
        <div class="metric accent"><span id="m-week" class="m-num">0</span><span class="m-label">今週締切</span></div>
      </div>
      <h2>締切が近い</h2>
      <div id="home-deadlines" class="card-list"></div>
    </section>

    <!-- 一覧 -->
    <section id="view-list" class="view hidden">
      <div class="toolbar">
        <input id="search" type="search" placeholder="検索…" />
      </div>
      <div id="company-list" class="card-list"></div>
    </section>

    <!-- 締切 -->
    <section id="view-deadlines" class="view hidden">
      <ul id="deadline-list" class="dl-list"></ul>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
